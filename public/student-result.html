<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Results</title>

<style>
  :root {
    --primary: #2563eb;
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #1f2937;
    --muted: #6b7280;
    --border: #e5e7eb;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  .container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
  }

  /* ===== HEADER ===== */
  .header {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .header h2 {
    margin: 0;
  }

  .cgpa-box {
    background: var(--primary);
    color: white;
    padding: 10px 18px;
    border-radius: 8px;
    font-weight: 600;
  }

  /* ===== CARD ===== */
  .card {
    background: var(--card);
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    padding: 20px;
  }

  /* ===== TABLE ===== */
  .table-wrapper {
    overflow-x: auto;
    margin-top: 10px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 650px;
  }

  th, td {
    padding: 12px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }

  th {
    background: #f1f5f9;
    font-weight: 600;
  }

  tbody tr:hover {
    background: #f9fafb;
  }

  /* ===== BUTTON ===== */
  .actions {
    margin-top: 25px;
    text-align: center;
  }

  button {
    background: var(--primary);
    color: white;
    border: none;
    padding: 14px 28px;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
  }

  button:disabled {
    background: #9ca3af;
    cursor: not-allowed;
  }

  button:hover:not(:disabled) {
    transform: translateY(-1px);
    opacity: 0.95;
  }

  /* ===== MOBILE ===== */
  @media (max-width: 600px) {
    .header {
      flex-direction: column;
      align-items: flex-start;
    }

    .cgpa-box {
      width: 100%;
      text-align: center;
    }
  }
</style>
</head>

<body>
<div class="container">

  <div class="header">
    <h2>📊 My Exam Results</h2>
    <div class="cgpa-box">
      Total CGPA: <span id="cgpa">0.00</span>
    </div>
  </div>

  <div class="card">
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Course Code</th>
            <th>Course Title</th>
            <th>Score</th>
            <th>Total</th>
            <th>Percentage</th>
            <th>Weighted</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>

    <div class="actions">
      <button id="downloadPdfBtn" disabled>
        📄 Download Result as PDF
      </button>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
const token = localStorage.getItem("token");
const btn = document.getElementById("downloadPdfBtn");
const tbody = document.getElementById("resultsBody");

let studentInfo = {};
let studentResults = [];

// Check login
if (!token) {
    alert("Session expired. Please login again.");
    window.location.href = "/";
}

// ===============================
// Load Student Results
// ===============================
fetch("/api/student/results", {
    headers: {
        Authorization: "Bearer " + token
    }
})
.then(async res => {

    if (!res.ok) {
        throw new Error(await res.text());
    }

    return res.json();

})
.then(results => {

    console.log("Student Results:", results);

    studentResults = results;

    tbody.innerHTML = "";

    if (results.length === 0) {

        tbody.innerHTML = `
        <tr>
            <td colspan="6">No results available.</td>
        </tr>`;

        document.getElementById("cgpa").innerText = "0.00";
        btn.disabled = true;
        return;
    }

    let totalWeighted = 0;

    results.forEach(r => {

        totalWeighted += Number(r.weighted_score);

        tbody.innerHTML += `
        <tr>
            <td>${r.courseCode}</td>
            <td>${r.courseTitle}</td>
            <td>${r.score}</td>
            <td>${r.total_questions}</td>
            <td>${Number(r.percentage).toFixed(2)}%</td>
            <td>${Number(r.weighted_score).toFixed(2)}</td>
        </tr>`;
    });

    const cgpa = totalWeighted / results.length;

    document.getElementById("cgpa").innerText = cgpa.toFixed(2);

    btn.disabled = false;

})
.catch(err => {

    console.error(err);

    tbody.innerHTML = `
    <tr>
        <td colspan="6">Failed to load results.</td>
    </tr>`;

});


// ===============================
// Load Student Profile
// ===============================
fetch("/api/me", {
    headers: {
        Authorization: "Bearer " + token
    }
})
.then(res => res.json())
.then(data => {

    studentInfo = data;

})
.catch(console.error);


// ===============================
// Download PDF
// ===============================
btn.addEventListener("click", () => {

    const { jsPDF } = window.jspdf;

    const pdf = new jsPDF();

    pdf.setFontSize(18);
    pdf.text("STUDENT EXAM RESULT", 14, 20);

    pdf.setFontSize(11);

    pdf.text(`Name: ${studentInfo.fullName || ""}`, 14, 35);
    pdf.text(`Student ID: ${studentInfo.roleSpecificField || ""}`, 14, 43);
    pdf.text(`Department: ${studentInfo.department || ""}`, 14, 51);
    pdf.text(`Level: ${studentInfo.level || ""}`, 14, 59);

    pdf.text(`CGPA: ${document.getElementById("cgpa").innerText}`, 150, 35);

    let y = 75;

    pdf.setFontSize(12);

    pdf.text("Code",14,y);
    pdf.text("Title",40,y);
    pdf.text("Score",105,y);
    pdf.text("Total",122,y);
    pdf.text("%",142,y);
    pdf.text("Weight",158,y);

    y += 10;

    studentResults.forEach(r => {

        pdf.text(String(r.courseCode),14,y);

        pdf.text(
            String(r.courseTitle).substring(0,25),
            40,
            y
        );

        pdf.text(String(r.score),105,y);

        pdf.text(String(r.total_questions),122,y);

        pdf.text(Number(r.percentage).toFixed(2),142,y);

        pdf.text(Number(r.weighted_score).toFixed(2),158,y);

        y += 8;

        if(y > 280){
            pdf.addPage();
            y = 20;
        }

    });

    pdf.setFontSize(10);

    pdf.text(
        "Generated on " + new Date().toLocaleDateString(),
        14,
        290
    );

    pdf.save(
        `${studentInfo.roleSpecificField || "student"}_Result.pdf`
    );

});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Update User</title>
  <link rel="stylesheet" href="reg.css">
</head>
<body>

<div class="registration-container">
  <h2>Update User</h2>

  <div class="form-group">
    <label>User ID</label>
    <input type="text" id="userId" placeholder="UABS0001">
  </div>

  <button class="submit-btn" onclick="fetchUser()">Fetch User</button>

  <form id="updateForm" style="display:none; margin-top:20px;">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="fullName">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email">
    </div>

    <div class="form-group">
      <label>Department</label>
      <input type="text" id="department">
    </div>

    <div class="form-group">
      <label>Level</label>
      <input type="text" id="level">
    </div>

    <button type="submit" class="submit-btn">Update</button>
   
  </form>
  <!-- Forgot Password Link below the login button -->
      <a href="forgot-password.html" class="forgot-password">Forgot Password?</a>
</div>
 

<script src="update-user.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Assign Exams</title>
<style>
:root {
  --primary: #2563eb; --primary-dark: #1e40af;
  --bg: #f5f7fb; --card: #ffffff; --text: #1f2937;
  --muted: #6b7280; --border: #e5e7eb;
}
* { box-sizing:border-box; font-family:"Segoe UI", Tahoma, sans-serif; }
body { margin:0; padding:20px; background:var(--bg); color:var(--text); }
.container { max-width:1200px; margin:auto; }
h2 { margin-bottom:16px; font-size:1.6rem; }
.card { background:var(--card); border-radius:10px; padding:20px; box-shadow:0 10px 25px rgba(0,0,0,0.05); margin-bottom:20px; }
.search-bar { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
.search-bar input { flex:1; min-width:200px; padding:10px; border-radius:8px; border:1px solid var(--border); }
.search-bar button { padding:10px 16px; border:none; border-radius:8px; cursor:pointer; background:var(--primary); color:white; transition:0.2s; }
.search-bar button.secondary { background:#e5e7eb; color:var(--text); }
.search-bar button:hover { background:var(--primary-dark); }
.search-bar button.secondary:hover { background:#d1d5db; }
.table-wrapper { overflow-x:auto; }
table { width:100%; border-collapse:collapse; min-width:800px; }
thead { background:var(--primary); color:white; }
th, td { padding:12px 14px; text-align:left; border-bottom:1px solid var(--border); font-size:0.9rem; }
tbody tr:hover { background:#f1f5ff; }
td { color:var(--text); }
.empty { text-align:center; color:var(--muted); padding:20px; }
button.delete-btn { background:#dc2626; color:white; padding:6px 12px; border:none; border-radius:6px; cursor:pointer; }
button.delete-btn:hover { background:#b91c1c; }
@media (max-width:768px){ .search-bar { flex-direction:column; } .search-bar button { width:100%; } }
</style>
</head>
<body>
<div class="container">
  <h2>📚 Assigned Exams</h2>
  <div class="card">
    <div class="search-bar">
      <input type="text" id="examSearchInput" placeholder="Search by ID, Title, or Code">
      <button onclick="searchExams()">Search</button>
      <button class="secondary" onclick="loadAllExams()">Show All</button>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Exam ID</th>
            <th>Course Title</th>
            <th>Course Code</th>
            <th>Department</th>
            <th>Level</th>
            <th>Units</th>
            <th>Exam Time</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="examsBody">
          <tr><td colspan="8" class="empty">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
const token = localStorage.getItem('token');
let examsData = [];

function loadAllExams() {
  fetch('/api/exam-courseTitle', { headers: { Authorization: 'Bearer '+token } })
    .then(res => res.json())
    .then(data => {
      examsData = data;
      renderExams(data);
    })
    .catch(err => {
      console.error('Error fetching exams:', err);
      document.getElementById('examsBody').innerHTML = `<tr><td colspan="8" class="empty">Failed to load exams</td></tr>`;
    });
}

function searchExams() {
  const val = document.getElementById('examSearchInput').value.trim().toLowerCase();

  // Default filter: search in all fields (ID, Title, Code)
  let filtered = examsData.filter(e =>
    (e.id && e.id.toString().toLowerCase().includes(val)) ||
    (e.courseTitle && e.courseTitle.toLowerCase().includes(val)) ||
    (e.courseCode && e.courseCode.toLowerCase().includes(val))
  );

  // If input is a number, do exact match on exam ID
  if (!isNaN(val) && val !== '') {
    filtered = examsData.filter(e => e.id == Number(val));
  }

  renderExams(filtered);
}


function renderExams(data) {
  const body = document.getElementById('examsBody');
  if (data.length === 0) {
    body.innerHTML = `<tr><td colspan="8" class="empty">No exams found</td></tr>`;
    return;
  }

  body.innerHTML = data.map(e => `
    <tr>
      <td>${e.id || 'N/A'}</td>
      <td>${e.courseTitle || 'N/A'}</td>
      <td>${e.courseCode || 'N/A'}</td>
      <td>${e.eligibleDepartment || 'N/A'}</td>
      <td>${e.eligibleLevel || 'N/A'}</td>
      <td>${e.unitAllocated || 'N/A'}</td>
      <td>${e.examTime || 'N/A'}</td>
      <td>
        <button class="delete-btn" onclick="deleteExam(${e.id})">Delete</button>
      </td>
    </tr>
  `).join('');
}

function deleteExam(examId) {
  if (!confirm('Are you sure you want to delete this exam?')) return;
  fetch(`/api/exam/${examId}`, { method:'DELETE', headers:{ Authorization:'Bearer '+token }})
    .then(res => res.json())
    .then(res => {
      alert(res.message);
      loadAllExams();
    })
    .catch(err => {
      console.error('Error deleting exam:', err);
      alert('Failed to delete exam');
    });
}

loadAllExams();
</script>
</body>
</html>

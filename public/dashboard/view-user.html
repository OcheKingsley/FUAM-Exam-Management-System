<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Registered Users</title>
<style>
:root {
  --primary: #2563eb; --primary-dark: #1e40af;
  --bg: #f5f7fb; --card: #ffffff; --text: #1f2937;
  --muted: #6b7280; --border: #e5e7eb;
}
* { box-sizing:border-box; font-family:"Segoe UI", Tahoma, sans-serif; }
body { margin:0; padding:20px; background:var(--bg); color:var(--text); }
.container { max-width:1200px; margin:auto; }
h2 { margin-bottom:16px; font-size:1.6rem; }
.card { background:var(--card); border-radius:10px; padding:20px; box-shadow:0 10px 25px rgba(0,0,0,0.05); margin-bottom:20px; }
.search-bar { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
.search-bar input { flex:1; min-width:200px; padding:10px; border-radius:8px; border:1px solid var(--border); }
.search-bar button { padding:10px 16px; border:none; border-radius:8px; cursor:pointer; background:var(--primary); color:white; transition:0.2s; }
.search-bar button.secondary { background:#e5e7eb; color:var(--text); }
.search-bar button:hover { background:var(--primary-dark); }
.search-bar button.secondary:hover { background:#d1d5db; }
.table-wrapper { overflow-x:auto; }
table { width:100%; border-collapse:collapse; min-width:800px; }
thead { background:var(--primary); color:white; }
th, td { padding:12px 14px; text-align:left; border-bottom:1px solid var(--border); font-size:0.9rem; }
tbody tr:hover { background:#f1f5ff; }
td { color:var(--text); }
.empty { text-align:center; color:var(--muted); padding:20px; }
@media (max-width:768px){ .search-bar { flex-direction:column; } .search-bar button { width:100%; } }
</style>
</head>
<body>
<div class="container">
  <h2>👥 Registered Users</h2>
  <div class="card">
    <div class="search-bar">
      <input type="text" id="userSearchInput" placeholder="Search by ID, Name or Email">
      <button onclick="searchUsers()">Search</button>
      <button class="secondary" onclick="loadAllUsers()">Show All</button>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>User ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Department</th>
            <th>Level</th>
          </tr>
        </thead>
        <tbody id="usersBody">
          <tr><td colspan="6" class="empty">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
const token = localStorage.getItem('token');
let usersData = [];

function loadAllUsers() {
  fetch('/api/admin/users', { headers:{Authorization:'Bearer '+token} })
    .then(res=>res.json())
    .then(data => { usersData = data; renderUsers(data); });
}

function searchUsers() {
  const val = document.getElementById('userSearchInput').value.toLowerCase();
  const filtered = usersData.filter(u => 
    u.user_id.toLowerCase().includes(val) ||
    u.name.toLowerCase().includes(val) ||
    u.email.toLowerCase().includes(val)
  );
  renderUsers(filtered);
}

function renderUsers(data){
  const body = document.getElementById('usersBody');
  if(data.length === 0){
    body.innerHTML = `<tr><td colspan="6" class="empty">No users found</td></tr>`;
    return;
  }

  body.innerHTML = data.map(u=>`<tr>
    <td>${u.user_id || 'N/A'}</td>
    <td>${u.name || 'N/A'}</td>
    <td>${u.email || 'N/A'}</td>
    <td>${u.role || 'N/A'}</td>
    <td>${u.department || 'N/A'}</td>
    <td>${u.level || 'N/A'}</td>
  </tr>`).join('');
}

loadAllUsers();
</script>
</body>
</html>

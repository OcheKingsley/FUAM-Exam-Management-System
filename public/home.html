<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Federal University of Agriculture Makurdi</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
      integrity="sha512-Fo3rlrZj/k7ujTnHg4CGR2D7kSs0v4LLanw2qksYuRlEzO+tcaEPQogQ0KaoGN26/zrn20ImR1DfuLWnOo7aBA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="home.css" />
  </head>
  <body>
    <div class="container">
      <img src="./images/fuam.jpg" alt="">
      <h1>Welcome To FUAM Website</h1>
      <button class="btn">Click to Login</button>
    </div>
    <div class="popup-container active">
      
 <h4>Login to Your Account</h4>

      <label for="username">Login UserID</label>
      <input type="text" id="username" class="input" placeholder="Enter your login name" />

      <label for="userType">User Type</label>
      <select id="userType" class="input">
        <option value="" disabled selected>Select user type</option>
        <option value="student">Student</option>
        <option value="staff">Staff</option>
        <option value="admin">Admin</option>
      </select>

      <label for="password">Password</label>
      <div class="password-wrapper">
      <input
        type="password"
        id="password"
        class="input"
        placeholder="Enter your password"
      />
      <i class="fas fa-eye toggle-password" id="togglePassword"></i>
    </div>


      <button class="popup-btn">Login</button>
      
      
      <div class="close-icon">
       <img src="./images/download.png" alt="X">
      </div>
    </div>
    <script src="home.js"></script>
  </body>
</html>

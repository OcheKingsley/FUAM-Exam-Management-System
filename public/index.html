<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Exam Assignment</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Student Exam Assignment</h1>
        <form id="examForm">
            <label for="courseTitle">Course Title:</label>
            <input type="text" id="courseTitle" name="courseTitle" required><br><br>
            
            <label for="courseCode">Course Code:</label>
            <input type="text" id="courseCode" name="courseCode" required><br><br>
            
            <label for="eligibleDepartment">Eligible Department:</label>
            <input type="text" id="eligibleDepartment" name="eligibleDepartment" required><br><br>
            
            <label for="eligibleLevel">Eligible Level:</label>
            <input type="text" id="eligibleLevel" name="eligibleLevel" required><br><br>
            
            <label for="unitAllocated">Unit Allocated:</label>
            <input type="number" id="unitAllocated" name="unitAllocated" required><br><br>
            
            <label for="allocatedTime">Allocated Time (minutes):</label>
            <input type="number" id="allocatedTime" name="allocatedTime" required><br><br>
            
            <label for="examTime">Exam Time:</label>
            <input type="datetime-local" id="examTime" name="examTime" required><br><br>
            
            <label for="endTime">End Time:</label>
            <input type="datetime-local" id="endTime" name="endTime" required><br><br>
            
            <button type="submit">Assign Exam</button>
        </form>
        <div id="message"></div>
    </div>
    
    <script src="script2.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - FUAM</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    /* Basic reset */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #007bff, #00aaff);
    }

    .forgot-container {
      background: #fff;
      padding: 30px 40px;
      border-radius: 12px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      text-align: center;
      animation: fadeIn 0.5s ease;
    }

    .forgot-container h2 {
      margin-bottom: 20px;
      color: #007bff;
    }

    .forgot-container label {
      display: block;
      margin: 12px 0 6px;
      text-align: left;
      font-weight: 600;
      color: #333;
    }

    .forgot-container input {
      width: 100%;
      padding: 12px 15px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
      outline: none;
      transition: border 0.3s;
    }

    .forgot-container input:focus {
      border-color: #007bff;
    }

    .forgot-container button {
      background-color: #007bff;
      color: #fff;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s;
      width: 100%;
      margin-top: 10px;
    }

    .forgot-container button:hover {
      background-color: #0056b3;
    }

    .forgot-container .link {
      display: block;
      margin-top: 15px;
      color: #007bff;
      text-decoration: none;
      font-size: 14px;
    }

    .forgot-container .link:hover {
      text-decoration: underline;
    }

    .message {
      margin-top: 10px;
      font-size: 14px;
      color: green;
    }

    .error {
      color: red;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="forgot-container">
    <h2>Reset Your Password</h2>
    <label for="userId">User ID / Email</label>
    <input type="text" id="userId" placeholder="Enter your login ID or email">

    <label for="newPassword">New Password</label>
    <input type="password" id="newPassword" placeholder="Enter new password">

    <label for="confirmPassword">Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="Confirm new password">

    <button id="resetBtn">Reset Password</button>
    <div class="message" id="message"></div>
    <a href="home.html" class="link">Back to Login</a>
  </div>

  <script>
    const resetBtn = document.getElementById('resetBtn');
    const message = document.getElementById('message');

    resetBtn.addEventListener('click', async () => {
      const userId = document.getElementById('userId').value.trim();
      const newPassword = document.getElementById('newPassword').value.trim();
      const confirmPassword = document.getElementById('confirmPassword').value.trim();

      message.textContent = '';
      message.classList.remove('error');

      if (!userId || !newPassword || !confirmPassword) {
        message.textContent = 'All fields are required';
        message.classList.add('error');
        return;
      }

      if (newPassword !== confirmPassword) {
        message.textContent = 'Passwords do not match';
        message.classList.add('error');
        return;
      }

      try {
        const res = await fetch('/api/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, newPassword })
        });

        const data = await res.json();
        if (res.ok) {
          message.textContent = data.message;
        } else {
          message.textContent = data.message || 'Error resetting password';
          message.classList.add('error');
        }
      } catch (err) {
        message.textContent = 'Server error, try again later';
        message.classList.add('error');
      }
    });
  </script>
</body>
</html>

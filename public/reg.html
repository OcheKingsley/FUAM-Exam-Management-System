<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Portal </title>
    <link rel="stylesheet" href="reg.css">
</head>
<body>
      <div class="registration-container">
    <h2>Registration Portal</h2>
    <form id="registrationForm">
      <div class="form-group">
        <label for="role">Select Role</label>
        <select id="role" name="role" required>
          <option value="">-- Choose --</option>
          <option value="student">Student</option>
          <option value="staff">Staff</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" name="fullName" placeholder="John Doe" required />
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="example@domain.com" required />
      </div>
      <div class="form-group">
        <label for="department">Department</label>
        <select id="department" name="department">
          <option value="">-- Select Department --</option>
          <option value="Computer Science">Computer Science</option>
          <option value="Information Technology">Information Technology</option>
          <option value="Engineering">Engineering</option>
          <option value="Nursing">Nursing</option>
          <option value="public-heaqlth">Public health</option>
          <option value="Economics">Economics</option>
          <option value="Internal-relation">Internal relation</option>
          <option value="mass-communication">Mass Communication</option>
        </select>
      </div>

      <div class="form-group">
        <label for="level">Level</label>
        <select id="level" name="level">
          <option value="">-- Select Level --</option>
          <option value="100">100 Level</option>
          <option value="200">200 Level</option>
          <option value="300">300 Level</option>
          <option value="400">400 Level</option>
        </select>
      </div>

      <div class="form-group">
        <label for="roleSpecificField" id="roleLabel">Student ID</label>
        <input type="text" id="roleSpecificField" name="roleSpecificField" placeholder="Auto-generated ID" readonly />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required />
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm password" required />
        <div class="error-message" id="passwordError">Passwords do not match.</div>
      </div>
      <button type="submit" class="submit-btn">Register</button>
    </form>
  </div>
<script src="reg.js"></script>
</body>
</html>
